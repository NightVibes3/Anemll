name: Build Unsigned IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned Real-Device IPA
    runs-on: macos-15

    env:
      SCHEME: ANEMLLChat
      CONFIGURATION: Release
      PROJECT_PATH: AnemllChat/AnemllChat.xcodeproj
      DERIVED_DATA: ${{ github.workspace }}/DerivedData
      ARCHIVE_PATH: ${{ github.workspace }}/build/ANEMLLChat.xcarchive
      IPA_DIR: ${{ github.workspace }}/build/ipa

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Fetch full history so 'git describe' works for build numbers
          fetch-depth: 0

      # ── 2. Pin Xcode version ───────────────────────────────────────────────
      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      # ── 3. Pre-generate the missing xcconfig ──────────────────────────────
      # The project's "Set Build Number from Git" run-script phase writes
      # ANEMLLChat/generated-build-number.xcconfig at build time, but Xcode
      # tries to read it as a base configuration *before* any script runs.
      # We create it here with a sensible value so the build doesn't fail.
      - name: Generate build-number xcconfig
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          XCCONFIG_PATH="${{ github.workspace }}/ANEMLLChat/generated-build-number.xcconfig"
          echo "CURRENT_PROJECT_VERSION = ${BUILD_NUMBER}" > "$XCCONFIG_PATH"
          echo "MARKETING_VERSION = 1.0.0" >> "$XCCONFIG_PATH"
          echo "✅ Written: $XCCONFIG_PATH"
          cat "$XCCONFIG_PATH"

      # ── 4. Resolve Swift Package Manager dependencies ──────────────────────
      - name: Resolve SPM packages
        run: |
          xcodebuild \
            -project "${{ env.PROJECT_PATH }}" \
            -scheme  "${{ env.SCHEME }}" \
            -resolvePackageDependencies \
            -derivedDataPath "${{ env.DERIVED_DATA }}"

      # ── 5. Archive targeting generic iOS device (arm64, unsigned) ─────────
      - name: Archive (unsigned)
        run: |
          xcodebuild archive \
            -project           "${{ env.PROJECT_PATH }}" \
            -scheme            "${{ env.SCHEME }}" \
            -configuration     "${{ env.CONFIGURATION }}" \
            -destination       "generic/platform=iOS" \
            -archivePath       "${{ env.ARCHIVE_PATH }}" \
            -derivedDataPath   "${{ env.DERIVED_DATA }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_INSTALL=NO

      # ── 6. Package .app → unsigned .ipa ───────────────────────────────────
      - name: Package IPA
        run: |
          APP_PATH=$(find "${{ env.ARCHIVE_PATH }}/Products/Applications" \
            -maxdepth 1 -name "*.app" | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found in archive. Listing archive contents:"
            find "${{ env.ARCHIVE_PATH }}" -maxdepth 4
            exit 1
          fi

          echo "✅ Found app: $APP_PATH"
          mkdir -p "${{ env.IPA_DIR }}/Payload"
          cp -R "$APP_PATH" "${{ env.IPA_DIR }}/Payload/"
          cd "${{ env.IPA_DIR }}"
          zip -r ANEMLLChat.ipa Payload
          ls -lh ANEMLLChat.ipa

      # ── 7. Upload IPA as workflow artifact ────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ANEMLLChat-unsigned-${{ github.sha }}
          path: ${{ env.IPA_DIR }}/ANEMLLChat.ipa
          retention-days: 14
