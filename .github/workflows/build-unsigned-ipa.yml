name: Build Unsigned IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned Real-Device IPA
    runs-on: macos-15

    env:
      # ── Adjust these if your scheme/project name differs ──────────────────
      SCHEME: AnemllChat
      CONFIGURATION: Release
      # Path to the .xcodeproj (relative to repo root).
      # Switch to .xcworkspace below if CocoaPods is ever added.
      PROJECT_PATH: AnemllChat/AnemllChat.xcodeproj
      DERIVED_DATA: ${{ github.workspace }}/DerivedData
      ARCHIVE_PATH: ${{ github.workspace }}/build/AnemllChat.xcarchive
      IPA_DIR: ${{ github.workspace }}/build/ipa

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: Anemll/Anemll
          submodules: recursive

      # ── 2. Pin Xcode version ───────────────────────────────────────────────
      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Print Xcode version
        run: xcodebuild -version

      # ── 3. Discover scheme (sanity check) ─────────────────────────────────
      - name: List available schemes
        run: |
          if [ -d "${{ env.PROJECT_PATH }}" ]; then
            xcodebuild -list -project "${{ env.PROJECT_PATH }}" 2>&1 || true
          fi
          # Scan repo for any Xcode project/workspace files
          find . -maxdepth 3 \( -name "*.xcworkspace" -o -name "*.xcodeproj" \) \
            ! -path "*/DerivedData/*" ! -path "*/.build/*" 2>/dev/null | head -20

      # ── 4. Resolve Swift Package Manager dependencies ──────────────────────
      - name: Resolve SPM packages
        run: |
          xcodebuild \
            -project "${{ env.PROJECT_PATH }}" \
            -scheme  "${{ env.SCHEME }}" \
            -resolvePackageDependencies \
            -derivedDataPath "${{ env.DERIVED_DATA }}"

      # ── 5. Archive targeting generic iOS device (arm64) ───────────────────
      #   CODE_SIGN_IDENTITY=""       → bypass signing entirely
      #   CODE_SIGNING_REQUIRED=NO    → don't error if no identity found
      #   CODE_SIGNING_ALLOWED=NO     → suppress the signing build phase
      - name: Archive (unsigned)
        run: |
          xcodebuild archive \
            -project           "${{ env.PROJECT_PATH }}" \
            -scheme            "${{ env.SCHEME }}" \
            -configuration     "${{ env.CONFIGURATION }}" \
            -destination       "generic/platform=iOS" \
            -archivePath       "${{ env.ARCHIVE_PATH }}" \
            -derivedDataPath   "${{ env.DERIVED_DATA }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_INSTALL=NO

      # ── 6. Package .app → unsigned .ipa ───────────────────────────────────
      #   Manually wraps the .app in a Payload/ folder and zips it.
      #   This produces a standard unsigned IPA recognised by AltStore,
      #   Sideloadly, TrollStore, etc.
      - name: Package IPA
        run: |
          APP_PATH=$(find "${{ env.ARCHIVE_PATH }}/Products/Applications" \
            -maxdepth 1 -name "*.app" | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found in archive. Listing archive contents:"
            find "${{ env.ARCHIVE_PATH }}" -maxdepth 4
            exit 1
          fi

          echo "✅ Found app: $APP_PATH"
          mkdir -p "${{ env.IPA_DIR }}/Payload"
          cp -R "$APP_PATH" "${{ env.IPA_DIR }}/Payload/"
          cd "${{ env.IPA_DIR }}"
          zip -r AnemllChat.ipa Payload
          echo "IPA_PATH=${{ env.IPA_DIR }}/AnemllChat.ipa" >> "$GITHUB_ENV"

      # ── 7. Verify IPA ──────────────────────────────────────────────────────
      - name: Verify IPA
        run: |
          ls -lh "${{ env.IPA_DIR }}/AnemllChat.ipa"
          unzip -l "${{ env.IPA_DIR }}/AnemllChat.ipa" | head -30

      # ── 8. Upload as workflow artifact ────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnemllChat-unsigned-${{ github.sha }}
          path: ${{ env.IPA_DIR }}/AnemllChat.ipa
          retention-days: 14
