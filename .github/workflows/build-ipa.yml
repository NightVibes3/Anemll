name: Build Unsigned IPA (iOS 26)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned Real-Device IPA (iOS 26)
    runs-on: macos-15   # Required for newest Xcode / iOS SDK

    env:
      SCHEME: ANEMLLChat
      CONFIGURATION: Release
      PROJECT_PATH: AnemllChat/AnemllChat.xcodeproj
      DERIVED_DATA: ${{ github.workspace }}/DerivedData
      ARCHIVE_PATH: ${{ github.workspace }}/build/ANEMLLChat.xcarchive
      IPA_DIR: ${{ github.workspace }}/build/ipa

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── 2. Select Latest Xcode (must contain iOS 26 SDK) ───────
      - name: Set up latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      # ── 3. Verify iOS 26 SDK Exists ─────────────────────────────
      - name: Confirm iOS 26 SDK
        run: |
          xcodebuild -showsdks
          xcodebuild -version

      # ── 4. Generate build-number xcconfig ───────────────────────
      - name: Generate build-number xcconfig
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          XCCONFIG_PATH="${{ github.workspace }}/ANEMLLChat/generated-build-number.xcconfig"
          echo "CURRENT_PROJECT_VERSION = ${BUILD_NUMBER}" > "$XCCONFIG_PATH"
          echo "MARKETING_VERSION = 1.0.0"                >> "$XCCONFIG_PATH"
          cat "$XCCONFIG_PATH"

      # ── 5. Resolve Swift Packages ───────────────────────────────
      - name: Resolve SPM packages
        run: |
          xcodebuild \
            -project "${{ env.PROJECT_PATH }}" \
            -scheme  "${{ env.SCHEME }}" \
            -resolvePackageDependencies \
            -derivedDataPath "${{ env.DERIVED_DATA }}"

      # ── 6. Archive for Generic iOS Device (iOS 26 SDK) ─────────
      - name: Archive (unsigned, iOS 26)
        run: |
          xcodebuild archive \
            -project           "${{ env.PROJECT_PATH }}" \
            -scheme            "${{ env.SCHEME }}" \
            -configuration     "${{ env.CONFIGURATION }}" \
            -sdk               iphoneos \
            -destination       "generic/platform=iOS" \
            -archivePath       "${{ env.ARCHIVE_PATH }}" \
            -derivedDataPath   "${{ env.DERIVED_DATA }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_INSTALL=NO

      # ── 7. Package .app → .ipa ─────────────────────────────────
      - name: Package IPA
        run: |
          APP_PATH=$(find "${{ env.ARCHIVE_PATH }}/Products/Applications" \
            -maxdepth 1 -name "*.app" | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "No .app found in archive."
            find "${{ env.ARCHIVE_PATH }}" -maxdepth 4
            exit 1
          fi

          mkdir -p "${{ env.IPA_DIR }}/Payload"
          cp -R "$APP_PATH" "${{ env.IPA_DIR }}/Payload/"
          cd "${{ env.IPA_DIR }}"
          zip -r ANEMLLChat.ipa Payload
          ls -lh ANEMLLChat.ipa

      # ── 8. Upload Artifact ──────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ANEMLLChat-unsigned-iOS26-${{ github.sha }}
          path: ${{ env.IPA_DIR }}/ANEMLLChat.ipa
          retention-days: 14
